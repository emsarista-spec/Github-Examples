name: Check Commit Message Format

on: [push]

jobs: 
    check-commit-msg:
        runs-on: ubuntu-latest
        steps:
          - name: Check commit message format
            if: (git log -1 --pretty=%B | grep -qE '^(feat|fix|docs|style|refactor|perf|test|chore|revert)(\(.+\))?: .{1,50}') == true
            run: |
              reject() {
                echo "Commit message does not follow the Conventional Commits format."
                echo "Please use the format: <type>(<scope>): <description>"
                echo "Example: feat(parser): add support for new syntax"
                exit 1
              }
                reject
    